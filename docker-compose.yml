version: '3.9'

# =====================================================
# StaySphere AOS — Full Docker Compose Stack
# =====================================================

x-common-env: &common-env
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
  EUREKA_URL: http://service-discovery:8761/eureka/
  CONFIG_SERVER_URL: http://config-server:8888
  KAFKA_SERVERS: kafka:9092
  REDIS_HOST: redis
  REDIS_PORT: 6379
  DB_USER: staysphere
  DB_PASS: staysphere_secret
  JWT_SECRET: ${JWT_SECRET:-bXlfc3VwZXJfc2VjcmV0X2tleV9mb3Jfc3RheXNwaGVyZV9wcm9kdWN0aW9uXzI1Ng==}

services:
  # ─── INFRASTRUCTURE ────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]
    volumes: [zookeeper-data:/var/lib/zookeeper/data]
    networks: [staysphere-net]
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes: [kafka-data:/var/lib/kafka/data]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    ports: ["9200:9200"]
    volumes: [es-data:/usr/share/elasticsearch/data]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── DATABASES ────────────────────────────────
  db-properties:
    image: postgres:16-alpine
    container_name: db-properties
    environment:
      POSTGRES_DB: staysphere_properties
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5432:5432"]
    volumes: [db-properties-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staysphere -d staysphere_properties"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-bookings:
    image: postgres:16-alpine
    container_name: db-bookings
    environment:
      POSTGRES_DB: staysphere_bookings
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5433:5432"]
    volumes: [db-bookings-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staysphere -d staysphere_bookings"]
      interval: 10s

  db-payments:
    image: postgres:16-alpine
    container_name: db-payments
    environment:
      POSTGRES_DB: staysphere_payments
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5434:5432"]
    volumes: [db-payments-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped

  db-ai:
    image: postgres:16-alpine
    container_name: db-ai
    environment:
      POSTGRES_DB: staysphere_ai
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5435:5432"]
    volumes: [db-ai-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped

  db-pricing:
    image: postgres:16-alpine
    container_name: db-pricing
    environment:
      POSTGRES_DB: staysphere_pricing
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5436:5432"]
    volumes: [db-pricing-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped

  db-trust:
    image: postgres:16-alpine
    container_name: db-trust
    environment:
      POSTGRES_DB: staysphere_trust
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5437:5432"]
    volumes: [db-trust-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped

  db-notifications:
    image: postgres:16-alpine
    container_name: db-notifications
    environment:
      POSTGRES_DB: staysphere_notifications
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5438:5432"]
    volumes: [db-notifications-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped


  db-auth:
    image: postgres:16-alpine
    container_name: db-auth
    environment:
      POSTGRES_DB: staysphere_auth
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5439:5432"]
    volumes: [db-auth-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staysphere -d staysphere_auth"]
      interval: 10s

  db-analytics:
    image: postgres:16-alpine
    container_name: db-analytics
    environment:
      POSTGRES_DB: staysphere_analytics
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5440:5432"]
    volumes: [db-analytics-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staysphere -d staysphere_analytics"]
      interval: 10s

  db-messaging:
    image: postgres:16-alpine
    container_name: db-messaging
    environment:
      POSTGRES_DB: staysphere_messaging
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5441:5432"]
    volumes: [db-messaging-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staysphere -d staysphere_messaging"]
      interval: 10s


  db-auction:
    image: postgres:16-alpine
    container_name: db-auction
    environment:
      POSTGRES_DB: staysphere_auction
      POSTGRES_USER: staysphere
      POSTGRES_PASSWORD: staysphere_secret
    ports: ["5442:5432"]
    volumes: [db-auction-data:/var/lib/postgresql/data]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staysphere -d staysphere_auction"]
      interval: 10s

  # ─── SPRING CLOUD INFRASTRUCTURE ──────────────
  service-discovery:
    build:
      context: .
      dockerfile: infrastructure/service-discovery/Dockerfile
    container_name: service-discovery
    environment:
      <<: *common-env
      EUREKA_USER: ${EUREKA_USER:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka_secret}
    ports: ["8761:8761"]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://eureka:eureka_secret@localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  config-server:
    build:
      context: .
      dockerfile: infrastructure/config-server/Dockerfile
    container_name: config-server
    depends_on:
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      EUREKA_URL: http://service-discovery:8761/eureka/
    ports: ["8888:8888"]
    networks: [staysphere-net]
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: infrastructure/api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      service-discovery:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8080
    ports: ["8080:8080"]
    networks: [staysphere-net]
    restart: unless-stopped

  # ─── MICROSERVICES ─────────────────────────────
  property-service:
    build:
      context: .
      dockerfile: services/property-service/Dockerfile
    container_name: property-service
    depends_on:
      db-properties:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8081
      DB_URL: jdbc:postgresql://db-properties:5432/staysphere_properties
      SHOPIFY_STORE_URL: ${SHOPIFY_STORE_URL}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN}
    ports: ["8081:8081"]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  booking-engine:
    build:
      context: .
      dockerfile: services/booking-engine/Dockerfile
    container_name: booking-engine
    depends_on:
      db-bookings:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8082
      DB_URL: jdbc:postgresql://db-bookings:5432/staysphere_bookings
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports: ["8082:8082"]
    networks: [staysphere-net]
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    depends_on:
      db-payments:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8083
      DB_URL: jdbc:postgresql://db-payments:5432/staysphere_payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports: ["8083:8083"]
    networks: [staysphere-net]
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: ai-service
    depends_on:
      db-ai:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8084
      DB_URL: jdbc:postgresql://db-ai:5432/staysphere_ai
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports: ["8084:8084"]
    networks: [staysphere-net]
    restart: unless-stopped

  pricing-engine:
    build:
      context: .
      dockerfile: services/pricing-engine/Dockerfile
    container_name: pricing-engine
    depends_on:
      db-pricing:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8085
      DB_URL: jdbc:postgresql://db-pricing:5432/staysphere_pricing
    ports: ["8085:8085"]
    networks: [staysphere-net]
    restart: unless-stopped

  trust-service:
    build:
      context: .
      dockerfile: services/trust-service/Dockerfile
    container_name: trust-service
    depends_on:
      db-trust:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8086
      DB_URL: jdbc:postgresql://db-trust:5432/staysphere_trust
    ports: ["8086:8086"]
    networks: [staysphere-net]
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      db-notifications:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8087
      DB_URL: jdbc:postgresql://db-notifications:5432/staysphere_notifications
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
    ports: ["8087:8087"]
    networks: [staysphere-net]
    restart: unless-stopped

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    container_name: search-service
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8088
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports: ["8088:8088"]
    networks: [staysphere-net]
    restart: unless-stopped

  shopify-integration:
    build:
      context: .
      dockerfile: shopify-integration/Dockerfile
    container_name: shopify-integration
    depends_on:
      kafka:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8090
      SHOPIFY_STORE_URL: ${SHOPIFY_STORE_URL}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN}
      SHOPIFY_STOREFRONT_TOKEN: ${SHOPIFY_STOREFRONT_TOKEN}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET}
    ports: ["8090:8090"]
    networks: [staysphere-net]
    restart: unless-stopped


  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      db-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8091
      DB_URL: jdbc:postgresql://db-auth:5432/staysphere_auth
    ports: ["8091:8091"]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: analytics-service
    depends_on:
      db-analytics:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8092
      DB_URL: jdbc:postgresql://db-analytics:5432/staysphere_analytics
    ports: ["8092:8092"]
    networks: [staysphere-net]
    restart: unless-stopped

  messaging-service:
    build:
      context: .
      dockerfile: services/messaging-service/Dockerfile
    container_name: messaging-service
    depends_on:
      db-messaging:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8093
      DB_URL: jdbc:postgresql://db-messaging:5432/staysphere_messaging
    ports: ["8093:8093"]
    networks: [staysphere-net]
    restart: unless-stopped


  auction-service:
    build:
      context: .
      dockerfile: services/auction-service/Dockerfile
    container_name: auction-service
    depends_on:
      db-auction:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8094
      DB_URL: jdbc:postgresql://db-auction:5432/staysphere_auction
    ports: ["8094:8094"]
    networks: [staysphere-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── MONITORING ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    volumes:
      - ./k8s/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports: ["9090:9090"]
    networks: [staysphere-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_secret}
      GF_SERVER_ROOT_URL: https://monitoring.staysphere.com
    ports: ["3000:3000"]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./k8s/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks: [staysphere-net]
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on: [kafka]
    environment:
      KAFKA_CLUSTERS_0_NAME: staysphere-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports: ["8989:8080"]
    networks: [staysphere-net]
    restart: unless-stopped

networks:
  staysphere-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  zookeeper-data:
  kafka-data:
  redis-data:
  es-data:
  db-properties-data:
  db-bookings-data:
  db-payments-data:
  db-ai-data:
  db-pricing-data:
  db-trust-data:
  db-notifications-data:
  db-auth-data:
  db-analytics-data:
  db-messaging-data:
  db-auction-data:
  prometheus-data:
  grafana-data:
