# ============================================================
# StaySphere AOS — auction-service PRODUCTION profile
# All secrets injected via environment variables
# ============================================================
spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    show-sql: false
  kafka:
    producer:
      retries: 3
      properties:
        enable.idempotence: true
        acks: all
    consumer:
      properties:
        isolation.level: read_committed
  data:
    redis:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          min-idle: 4

server:
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
  http2:
    enabled: true
  tomcat:
    threads:
      max: 200
      min-spare: 20

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

logging:
  level:
    com.staysphere: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
